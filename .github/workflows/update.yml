name: Update README date

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update date in README
        run: |
          DATE=$(date +'%Y-%m-%d')
          sed -i "s|location: 'Saint Petersburg · .*'|location: 'Saint Petersburg · $DATE'|" README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update date"
          git push
